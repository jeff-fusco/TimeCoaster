<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Time Coaster 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="scene"></div>

<div class="hud">
  <div class="topbar">
    <div class="card bank">
      <div class="label">Park Funds</div>
      <div class="money"><span class="cur">$</span><span id="money">0</span></div>
      <div class="rate" id="rate">$0 / min</div>
    </div>

    <div class="card ratings">
      <div class="rtitle"><span>Ride Rating</span><span class="grade" id="grade">—</span></div>
      <div class="rrow"><span class="rk">EXC</span><div class="rbar"><div class="rfill" id="fExc" style="background:var(--exc)"></div></div><span class="rv" id="vExc">0</span></div>
      <div class="rrow"><span class="rk">INT</span><div class="rbar"><div class="rfill" id="fInt" style="background:var(--int)"></div></div><span class="rv" id="vInt">0</span></div>
      <div class="rrow"><span class="rk">NAU</span><div class="rbar"><div class="rfill" id="fNau" style="background:var(--nau)"></div></div><span class="rv" id="vNau">0</span></div>
    </div>

    <div class="ministats">
      <div class="chip"><div class="v" id="riders">4</div><div class="k">Seats</div></div>
      <div class="chip"><div class="v" id="queue">0/10</div><div class="k">In Line</div></div>
      <div class="chip"><div class="v" id="perride">$8</div><div class="k">/ Ride</div></div>
      <div class="chip"><div class="v" id="topspeed">0</div><div class="k">Top mph</div></div>
      <div class="chip"><div class="v" id="trackLen">0m</div><div class="k">Length</div></div>
      <div class="chip"><div class="v" id="laptime">0s</div><div class="k">Lap</div></div>
    </div>

    <div class="mode-badge" id="modeBadge"><span>🔧</span><span>Build Mode</span></div>
  </div>

  <div class="bottom">
    <button class="ctrl" id="rotL" title="Rotate left (A / Q · or drag)">⟲</button>
    <button class="ctrl" id="zoomOut" title="Zoom out (− · or scroll)">－</button>
    <button class="ctrl" id="zoomIn"  title="Zoom in (+ · or scroll)">＋</button>
    <button class="ctrl" id="rotR" title="Rotate right (D / E · or drag)">⟳</button>
    <button class="ctrl" id="buildToggle" title="Toggle build mode (B)">🔧 Build</button>
  </div>
</div>

<div class="build-panel hidden" id="buildPanel">
  <div class="bp-row">
    <button class="bp-btn primary" id="addBtn">＋ Add Point</button>
    <button class="bp-btn danger"  id="delBtn" disabled>🗑 Delete</button>
    <button class="bp-btn"         id="snapBtn">Grid Off</button>
    <div class="bp-row" id="heightRow" style="display:none">
      <span class="bp-label">Height</span>
      <button class="bp-btn" id="hDown">▼</button>
      <span class="height-val" id="heightVal">0.0</span>
      <button class="bp-btn" id="hUp">▲</button>
    </div>
  </div>
  <div class="sep"></div>
  <div class="bp-row" id="featRow" style="display:none">
    <span class="bp-label">Segment</span>
    <button class="bp-btn" data-feat="plain">Plain<span class="fcost">free</span></button>
    <button class="bp-btn" data-feat="lift">⛓ Lift<span class="fcost">$120</span></button>
    <button class="bp-btn" data-feat="brake">🛑 Brake<span class="fcost">$60</span></button>
    <button class="bp-btn" data-feat="loop">🔁 Loop<span class="fcost">$900</span></button>
    <button class="bp-btn" data-feat="corkscrew">🌀 Corkscrew<span class="fcost">$1.4k</span></button>
  </div>
  <div class="build-cost" id="buildCost">Track: <b>0m</b> · build cost <b>$8/m</b></div>
  <div class="point-info" id="pointInfo">Click a handle to select · drag to move · scroll to change height</div>
</div>

<div class="shop" id="shop"></div>
<div class="toast" id="toast"></div>
<div class="title">Time Coaster 3D</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
